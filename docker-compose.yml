version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpaste-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: flowpaste
    ports:
      - "5432:5432"
    volumes:
      - flowpaste_postgres_data:/var/lib/postgresql/data

volumes:
  flowpaste_postgres_data:
